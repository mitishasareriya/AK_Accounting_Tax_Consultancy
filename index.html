<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo_favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AK Accounting - IT Business Solutions</title>
    <meta name="description" content="AK Accounting provides innovative IT business solutions, data analytics, finance consulting, and technology services." />

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 Free (CDN) - fixes fa-solid, fa-brands, fa-regular icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Bootstrap Icons 1.11 (CDN) - fixes bi-* icon classes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Feather Icons (CDN via feather-sprite, using font-based fallback class approach) -->
    <!-- Feather icons in the template use class="feather icon-feather-*" which are loaded via icon.min.css -->
    <!-- We load the Feather CDN as a web component/sprite as backup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" defer></script>
  </head>
  <body data-mobile-nav-style="full-screen-menu" data-mobile-nav-bg-color="#252840">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
